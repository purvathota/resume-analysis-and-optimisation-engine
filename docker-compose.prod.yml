version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: resume-optimizer-n8n
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-admin}
      - WEBHOOK_URL=https://${DOMAIN_NAME}/n8n/
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - resume-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-optimizer-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-cloudinary}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/custom-webhook-id
    networks:
      - resume-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-optimizer-frontend
    restart: always
    networks:
      - resume-network

  nginx:
    image: nginx:alpine
    container_name: resume-optimizer-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
      - n8n
    networks:
      - resume-network

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: resume-optimizer-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - resume-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana-oss:10.4.0
    container_name: resume-optimizer-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - resume-network
    depends_on:
      - prometheus

networks:
  resume-network:
    driver: bridge

volumes:
  n8n-data:
  prometheus-data:
  grafana-data:
