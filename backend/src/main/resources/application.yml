spring:
  application:
    name: ai-resume-optimizer
  
  # Virtual Threads Configuration
  threads:
    virtual:
      enabled: true
      
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/resumeoptimizer
    username: resumeoptimizer
    password: resumeoptimizer123
    driver-class-name: org.postgresql.Driver
    
  # JPA / Hibernate Configuration
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 20
    hikari:
      initialization-fail-timeout: -1
        
  # Flyway Migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    
  # Docker Compose (dev only)
  docker:
    compose:
      enabled: false
      file: ../docker-compose.yml
      lifecycle-management: start-only
      
  # Mail Configuration (MailHog)
  mail:
    host: localhost
    port: 1025
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            
  # MVC & Problem Details
  mvc:
    problemdetails:
      enabled: true
      
  # File Upload Config
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# OpenAPI/Swagger Config
springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_ENABLED:false}
    operationsSorter: method

# Security JWT Config
jwt:
  secret: ${JWT_SECRET:8f4c2299a9b23b499bc7b99c1234567890abcdef1234567890abcdef1234567890abcdef} # Override in prod
  expiration-ms: 86400000 # 24 hours

# AI Integration Config
openai:
  api-key: ${OPENAI_API_KEY:dummy}
  model: gpt-4o

# n8n Workflow Config
n8n:
  webhook-url: http://localhost:5678/webhook

server:
  port: ${PORT:8080}

# Actuator Config
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
    n8nHealthIndicator:
      enabled: false
    openAiHealthIndicator:
      enabled: false
  metrics:
    tags:
      application: ai-resume-optimizer
    export:
      prometheus:
        enabled: true
    enable:
      jvm: true
      hikaricp: true
      http: true
      hibernate: true

# Storage Configuration
storage:
  provider: ${STORAGE_PROVIDER:cloudinary}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

# AWS Config (Maintained for future/optional use)
aws:
  s3:
    bucket: ${AWS_S3_BUCKET:resume-optimizer-bucket}
    region: ${AWS_REGION:us-east-1}
